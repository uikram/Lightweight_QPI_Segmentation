experiment_name: "mobile_sam_lora_qpi"

cache_dir: "./cache"

data_root: "./dataset"

dataset:
  batch_size: 8
  num_workers: 4
  image_size: 512          # MobileSAM internal resize target — must match model default

model:
  architecture: "mobile_sam"
  in_channels: 1
  num_classes: 5

lora:
  lora_r: 8
  lora_alpha: 8.0
  lora_dropout: 0.0
  insertion_strategy: "attention_blocks"

training:
  epochs: 50
  learning_rate: 0.0005
  optimizer: "AdamW"
  mixed_precision: "fp16"

loss_weights:
  lambda1_pmc: 0.1
  lambda2_bga: 0.05
  lambda3_pv: 0.1

results_dir: "results/mobile_sam_lora"
checkpoint_dir: "results/mobile_sam_lora/checkpoints"
